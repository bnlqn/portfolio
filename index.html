<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231c1345'/><text y='.9em' font-size='80' font-family='serif' fill='white' x='10'>B</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+JP:wght@900&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+JP:wght@900&display=swap"></noscript>
<title>BNLQN</title>
<style>
  :root {
    --dark-blue: #1c1345;
    --stroke-width: 0.163em;
  }

  body {
    margin: 0;
    background-color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .logo {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-end;
    
    filter: 
      drop-shadow(1px 1px 0px var(--dark-blue))
      drop-shadow(2px 2px 0px var(--dark-blue))
      drop-shadow(4px 4px 0px var(--dark-blue))
      drop-shadow(8px 8px 0px var(--dark-blue))
      drop-shadow(16px 16px 0px var(--dark-blue));
  }

  .text {
    position: relative;
    color: #ffffff;
    margin: 0;
  }

  .text::before {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    color: var(--dark-blue);
    -webkit-text-stroke: var(--stroke-width) var(--dark-blue);
    pointer-events: none;
  }

  .bnlqn {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(50px, 17.8vw, 160px);
    line-height: 1;
    letter-spacing: -2px;
    z-index: 1;
  }

  .com {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 900;
    font-size: clamp(20px, 7.2vw, 65px);
    line-height: 1;
    margin-top: -0.54em;
    margin-right: -0.31em;
    letter-spacing: 2px;
    z-index: 2;
  }
</style>
</head>
<body>

<div class="logo">
  <div class="text bnlqn" data-text="BNLQN">BNLQN</div>
  <div class="text com" data-text=".com">.com</div>
</div>

</body>
</html>
