<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNLQN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+JP:wght@900&display=swap');

  :root {
    --dark-blue: #1c1345;
    --stroke-width: 26px; 
  }

  body {
    margin: 0;
    background-color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .logo-wrapper {
    transform: scale(min(1, 90vw / 900px));
  }

  .logo {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-end;
    
    filter: 
      drop-shadow(1px 1px 0px var(--dark-blue))
      drop-shadow(2px 2px 0px var(--dark-blue))
      drop-shadow(4px 4px 0px var(--dark-blue))
      drop-shadow(8px 8px 0px var(--dark-blue))
      drop-shadow(16px 16px 0px var(--dark-blue))
      drop-shadow(16px 16px 0px var(--dark-blue));
  }

  .text {
    position: relative;
    color: #ffffff;
    margin: 0;
  }

  .text::before {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    color: var(--dark-blue);
    -webkit-text-stroke: var(--stroke-width) var(--dark-blue);
    pointer-events: none;
  }

  .bnlqn {
    font-family: 'Archivo Black', sans-serif;
    font-size: 160px;
    line-height: 1;
    letter-spacing: -2px;
    z-index: 1;
  }

  .com {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 900;
    font-size: 65px;
    line-height: 1;
    margin-top: -35px;
    margin-right: -20px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="logo-wrapper">
  <div class="logo">
    <div class="text bnlqn" data-text="BNLQN">BNLQN</div>
    <div class="text com" data-text=".com">.com</div>
  </div>
</div>

</body>
</html>
